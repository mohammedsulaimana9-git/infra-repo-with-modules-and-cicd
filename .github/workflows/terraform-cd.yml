name: Terraform CD

on:
  workflow_dispatch:

jobs:
  terraform-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vault
        run: |
          wget https://releases.hashicorp.com/vault/1.15.5/vault_1.15.5_linux_amd64.zip
          unzip vault_1.15.5_linux_amd64.zip
          sudo mv vault /usr/local/bin/

      - name: Fetch AWS Credentials from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

        run: |
          vault status

          echo "AWS_ACCESS_KEY_ID=$(vault kv get -field=access_key secret/aws)" >> $GITHUB_ENV

          echo "AWS_SECRET_ACCESS_KEY=$(vault kv get -field=secret_key secret/aws)" >> $GITHUB_ENV

          echo "AWS_REGION=ap-south-1" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply --auto-approve